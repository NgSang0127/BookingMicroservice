input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Thêm timestamp chuẩn
  date {
    match => ["@timestamp", "ISO8601"]
  }

  # Parse exception nếu có
  if [stack_trace] {
    mutate {
      add_tag => ["has_exception"]
    }
  }

  # Gán index theo tên service
  mutate {
    add_field => { "index_prefix" => "clinic-%{app}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "clinic-%{app}-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }  # debug, bỏ ở prod
}