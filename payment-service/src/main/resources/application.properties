spring.application.name=payment-service

# Server
server.port=5006

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator (management)
management.endpoints.web.exposure.include=prometheus,health,info
management.health.readiness-state.enabled=true
management.health.liveness-state.enabled=true
management.endpoint.shutdown.access=read_only
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Shutdown endpoint (legacy)
endpoints.shutdown.enabled=true

#sepay
sepay.merchant-id= ${SEPAY_MERCHART_ID}
sepay.secret-key= ${SEPAY_SECRET_KEY}

#stripe
stripe.secret-key= ${STRIPE.SECRET_KEY}
stripe.public-key= ${STRIPE_PUBLIC_KEY}

# Razorpay
razorpay.api.key=${RAZORPAY_KEY:sssssssss}
razorpay.api.secret=${RAZORPAY_SECRET:ssssssssss}


# Eureka
eureka.instance.preferIpAddress=true
eureka.client.fetchRegistry=true
eureka.client.registerWithEureka=true
eureka.client.serviceUrl.defaultZone=http://localhost:8070/eureka/

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:7080/realms/clinic-booking

# Info
info.app.name=Payment Service
info.app.description=Payment Service API For Clinic Booking System
info.app.version=1.0.0
