spring.application.name=category-service
spring.profiles.active=local

# Server
server.port=5004

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/category_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator (management)
management.endpoints.web.exposure.include=prometheus,health,info
management.health.readiness-state.enabled=true
management.health.liveness-state.enabled=true
management.endpoint.shutdown.access=read_only
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

#Sleuth,Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411api/v2/spans

# Shutdown endpoint (legacy)
endpoints.shutdown.enabled=true

# Eureka
eureka.instance.preferIpAddress=true
eureka.client.fetchRegistry=true
eureka.client.registerWithEureka=true
eureka.client.serviceUrl.defaultZone=http://localhost:8070/eureka/

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:7080/realms/clinic-booking

# Info
info.app.name=CATEGORY
info.app.description=Category API For Clinic Booking System
info.app.version=1.0.0
